CONFIG_NCS_SAMPLES_DEFAULTS=y

CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_DEVICE_NAME="nordic_latency_central"
CONFIG_BT_MAX_CONN=1

# Encrypt the link automatically (Just Works, no bonding)
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=n

# Scan and connect using a device name filter
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_NAME_CNT=1

CONFIG_HEAP_MEM_POOL_SIZE=2048

# Connection parameters are driven by the application, not auto-negotiated
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
