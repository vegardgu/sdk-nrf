# Minimal low-power connectable peripheral for manual subrating / peripheral
# latency power measurements. UART, serial, logging and other power-drawing
# peripherals are disabled. The peer (central) drives connection setup,
# peripheral latency and subrating. The link is encrypted automatically.

CONFIG_NCS_SAMPLES_DEFAULTS=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=n
CONFIG_BT_DEVICE_NAME="nordic_latency_test"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_SUBRATING=y

# Do not auto-run host procedures; connection/subrating is driven externally
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_AUTO_PHY_PERIPHERAL_NONE=y
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n

CONFIG_BT_NUS=n
CONFIG_BT_SETTINGS=n
CONFIG_SETTINGS=n
CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_FLASH_MAP=n

CONFIG_DK_LIBRARY=n

# SMP/ECC (LE Secure Connections) needs heap for the PSA crypto backend.
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Drivers and peripherals
CONFIG_I2C=n
CONFIG_WATCHDOG=n
CONFIG_SPI=n
CONFIG_GPIO=n
CONFIG_SERIAL=n
CONFIG_UART_ASYNC_API=n
CONFIG_NRFX_UARTE=n

# Power / boot
CONFIG_NCS_BOOT_BANNER=n
CONFIG_BOOT_BANNER=n
CONFIG_BOOT_DELAY=0

# Console / logging
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_EARLY_CONSOLE=n
CONFIG_LOG=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n

# Build
CONFIG_SIZE_OPTIMIZATIONS=y

# ARM
CONFIG_ARM_MPU=n

# Disable features not needed
CONFIG_TIMESLICING=n
CONFIG_ASSERT=n

# Disable Bluetooth features not needed
CONFIG_BT_DEBUG_NONE=y
CONFIG_BT_ASSERT=n
CONFIG_BT_DATA_LEN_UPDATE=n
CONFIG_BT_PHY_UPDATE=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=n
CONFIG_BT_HCI_VS=n
